<app-navbar [titlePrefix]="navBarTitlePrefix"></app-navbar>
<div class="container">
  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-body">
          <h4 class="card-title">{{theaterName}}</h4>
          <div>
            {{theaterAddress}}<br>
            <a [href]="theaterUrl" target="_blank">{{theaterUrl}}</a>
          </div>
        </div>
      </div>
    </div>
    <div class="col-xl-6">
      @for (firstLevel of movieForTheaterWithSchedules | keyvalue; track firstLevel) {
        <div>
          <div class="card">
            <div class="card-header">
              <b>{{firstLevel.value[0]}}</b>
            </div>
            @for (m of firstLevel.value[1] | keyvalue; track m) {
              <div>
                @for (s of m.value; track s) {
                  <div>
                    <a [routerLink]="['/cinephilia/movies/', s.movie_id]">
                      <div class="singleMovie">
                        <b>{{m.key}}</b><br>
                        <small>{{s.time.toString() | slice : 11:16}}</small>
                      </div>
                    </a>
                  </div>
                }
              </div>
            }
            <!--<p><small>{{schedule.time.toString() | slice : 11:16}}</small></p>-->
          </div>
        </div>
      }
    </div>
  </div>
</div>
