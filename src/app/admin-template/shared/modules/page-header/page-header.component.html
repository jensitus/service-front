<div class="row">
  <div class="col-xl-12">
    <!--<h3 class="page-header">
    {{heading}}
  </h3>-->
  <ol class="breadcrumb">
    @if (routerlink) {
      <li class="breadcrumb-item">
        <i class="fa {{firstIcon}}"></i> <a href="Javascript:void(0)" [routerLink]="[routerlink]"> {{firstPoint}}</a>
      </li>
    }
    @if (!routerlink) {
      <li class="breadcrumb-item">
        <i class="fa {{firstIcon}}"></i> {{firstPoint}}
      </li>
    }
    <li class="breadcrumb-item active"><i class="fa {{icon}}"></i> {{heading}}</li>
  </ol>
</div>
</div>
